<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeffrey Perona Boyce &mdash; Product Designer</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Staatliches&family=Archivo+Narrow:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --green: #3dffa0;
      --green-glow: rgba(61,255,160,0.25);
      --green-glow-strong: rgba(61,255,160,0.5);
      --white: #ffffff;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--black);
      color: var(--green);
      font-family: 'Archivo Narrow', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 150px;
      pointer-events: none; z-index: 100; opacity: 0.4;
    }

    .page {
      display: flex; height: 100vh; width: 100vw;
      align-items: center; justify-content: center;
    }

    .inner {
      display: grid; grid-template-columns: auto 1fr;
      gap: 0 52px; align-items: start;
      max-width: 1200px; width: 100%; padding: 0 56px;
    }

    /* Name */
    .name-block {
      display: flex; flex-direction: column; line-height: 0.88;
      opacity: 0;
      animation: slideLeft 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
    }

    .name-part {
      font-family: 'Staatliches', sans-serif; font-weight: 400;
      font-size: clamp(96px, 12vw, 172px); letter-spacing: -0.01em;
      color: var(--green); text-transform: uppercase; display: block;
      text-shadow: 0 0 80px rgba(61,255,160,0.15), 0 2px 0 rgba(0,0,0,0.5);
    }

    /* Info panel */
    .info-panel {
      display: flex; flex-direction: column; gap: 0;
      opacity: 0; padding-top: 0.08em;
      animation: slideRight 0.9s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
    }

    .title-block { margin-bottom: 36px; }

    .role-title {
      font-family: 'Staatliches', sans-serif; font-weight: 400;
      font-size: clamp(28px, 3.5vw, 52px); text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--green); line-height: 1;
    }

    .companies-block { display: flex; flex-direction: column; margin-bottom: 48px; }

    .company-item {
      font-family: 'Archivo Narrow', sans-serif; font-weight: 700;
      font-size: clamp(16px, 1.9vw, 26px); letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--white);
      padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.07);
      position: relative; overflow: hidden; cursor: default;
      transition: color 0.2s ease;
    }

    .company-item:first-child { border-top: 1px solid rgba(255,255,255,0.07); }

    .company-item::after {
      content: ''; position: absolute; left: -100%; top: 0;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(61,255,160,0.06), transparent);
      transition: left 0.4s ease;
    }

    .company-item:hover { color: var(--green); }
    .company-item:hover::after { left: 100%; }

    /* Email button */
    .contact-block { display: flex; flex-direction: column; }

    .email-btn {
      display: inline-flex; align-items: center; gap: 14px;
      padding: 18px 30px; border: 2px solid var(--green); border-radius: 100px;
      background: transparent; color: var(--green); text-decoration: none;
      font-family: 'Archivo Narrow', sans-serif; font-weight: 700;
      font-size: clamp(12px, 1.3vw, 17px); letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer;
      position: relative; overflow: hidden; width: fit-content;
      transition: color 0.35s ease, box-shadow 0.35s ease, transform 0.2s ease;
    }

    .email-btn::before {
      content: ''; position: absolute; inset: 0; background: var(--green);
      transform: scaleX(0); transform-origin: left center;
      transition: transform 0.45s cubic-bezier(0.76,0,0.24,1);
      border-radius: 100px; z-index: 0;
    }

    .email-btn:hover::before { transform: scaleX(1); }
    .email-btn:hover {
      color: var(--black);
      box-shadow: 0 0 40px var(--green-glow-strong), 0 0 80px var(--green-glow);
      transform: translateY(-2px);
    }
    .email-btn:active { transform: translateY(0) scale(0.98); }

    .email-btn::after {
      content: ''; position: absolute; inset: -4px; border-radius: 100px;
      border: 1px solid var(--green); opacity: 0; transform: scale(0.95);
      transition: opacity 0.3s ease, transform 0.5s ease;
    }
    .email-btn:hover::after { opacity: 0.35; transform: scale(1.04); }

    .email-icon {
      width: 20px; height: 20px; flex-shrink: 0;
      position: relative; z-index: 1; transition: transform 0.3s ease;
    }
    .email-btn:hover .email-icon { transform: rotate(-5deg) scale(1.1); }
    .email-text { position: relative; z-index: 1; }

    /* Footer */
    .footer-bar {
      position: fixed; bottom: 32px; left: 0; right: 0;
      display: flex; justify-content: center;
      pointer-events: none; z-index: 50;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.3s forwards;
    }

    .footer-inner {
      max-width: 1200px; width: 100%; padding: 0 56px;
    }

    .footer-text,
    .footer-links {
      font-family: 'Archivo Narrow', sans-serif; font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(61,255,160,0.45);
    }

    .footer-text { font-size: clamp(11px, 1vw, 14px); }
    .footer-links { font-size: clamp(13px, 1.3vw, 17px); }

    .footer-links { margin-bottom: 5px; pointer-events: all; }

    .footer-links a {
      color: rgba(61,255,160,0.45); text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer-links a:hover { color: var(--green); }

    .footer-links .sep { color: rgba(61,255,160,0.25); margin: 0 7px; }

    /* Animations */
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(-32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .company-item:nth-child(1) { animation: fadeUp 0.6s ease 0.5s both; }
    .company-item:nth-child(2) { animation: fadeUp 0.6s ease 0.6s both; }
    .company-item:nth-child(3) { animation: fadeUp 0.6s ease 0.7s both; }
    .company-item:nth-child(4) { animation: fadeUp 0.6s ease 0.8s both; }
    .company-item:nth-child(5) { animation: fadeUp 0.6s ease 0.9s both; }
    .email-btn { animation: fadeUp 0.7s ease 1.1s both; }

    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .page { height: auto; min-height: 100vh; padding: 60px 0; }
      .inner { grid-template-columns: 1fr; padding: 0 28px; gap: 32px; }
      .name-block { line-height: 0.85; }
      .footer-inner { padding: 0 28px; }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="inner">

      <div class="name-block">
        <span class="name-part">Jeffrey</span>
        <span class="name-part">Perona</span>
        <span class="name-part">Boyce</span>
      </div>

      <div class="info-panel">
        <div class="title-block">
          <h1 class="role-title">Product Designer</h1>
        </div>

        <div class="companies-block">
          <div class="company-item">DeepMind Gemini</div>
          <div class="company-item">Google Assistant</div>
          <div class="company-item">Google</div>
          <div class="company-item">YouTube</div>
          <div class="company-item">Startups</div>
        </div>

        <div class="contact-block">
          <a class="email-btn" id="email-link" href="#">
            <svg class="email-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="email-text" id="email-text"></span>
          </a>
        </div>
      </div>

    </div>
  </div>

  <div class="footer-bar">
    <div class="footer-inner">
      <p class="footer-links">
        <a href="https://raw.githubusercontent.com/jeffreyboyce-byte/portfolio/main/jeffrey-perona-boyce-resume.pdf" target="_blank" rel="noopener">Resume</a>
        <span class="sep">&bull;</span>
        <a href="https://linkedin.com/in/jeffreyperonaboyce" target="_blank" rel="noopener">LinkedIn</a>
      </p>
      <p class="footer-text" id="footer-text"></p>
    </div>
  </div>

  <script>
    (function() {
      // Populate footer date line
      var months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
      var now = new Date();
      var footerEl = document.getElementById('footer-text');
      if (footerEl) {
        footerEl.textContent = months[now.getMonth()] + ' ' + now.getFullYear()
          + '. Based in the Bay Area, California where we get hyphy.';
      }

      // Set email link (assembled in JS to avoid scrapers)
      var user = 'hello';
      var domain = 'jeffreyperonaboyce.com';
      var addr = user + '@' + domain;
      var linkEl = document.getElementById('email-link');
      var textEl = document.getElementById('email-text');
      if (linkEl) linkEl.href = 'mailto:' + addr;
      if (textEl) textEl.textContent = addr;
    })();
  </script>

</body>
</html>
